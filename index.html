<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Textile Lab Software</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="header">

<h1>🧪 Textile Lab Software Pro</h1>

<p>Shrinkage Testing System v1.0</p>

</div>

<div class="container">
<div class="grid">

<div class="result">
<h3>Total Reports</h3>
<h2 id="totalReports">0</h2>
</div>

<div class="result">
<h3>PASS</h3>
<h2 id="totalPass">0</h2>
</div>

<div class="result">
<h3>FAIL</h3>
<h2 id="totalFail">0</h2>
</div>

</div>
<div class="grid">

<div>
<label>Buyer Name</label>
<input type="text" id="buyer">
</div>

<div>
<label>Style No</label>
<input type="text" id="style">
</div>

<div>
<label>Fabric</label>
<input type="text" id="fabric">
</div>

<div>
<label>Operator</label>
<input type="text" id="operator">
</div>

<div>
<label>Test Date</label>
<input type="date" id="date">
</div>

<div>
<label>Wash Method</label>
<select id="wash">
<option>Home Wash</option>
<option>Industrial Wash</option>
<option>Garment Wash</option>
</select>
</div>

</div>

<h2 style="margin-top:30px;">Warp</h2>

<div class="grid">

<div>
<label>Before Wash</label>
<input type="number" id="warpBefore">
</div>

<div>
<label>After Wash</label>
<input type="number" id="warpAfter">
</div>

</div>

<h2 style="margin-top:30px;">Weft</h2>

<div class="grid">

<div>
<label>Before Wash</label>
<input type="number" id="weftBefore">
</div>

<div>
<label>After Wash</label>
<input type="number" id="weftAfter">
</div>

</div>

<button onclick="calculate()">
Calculate
</button>
<button onclick="window.print()">
🖨️ Print Report
</button>
  <button onclick="saveReport()">
💾 Save Report
  </button>
<div class="result" id="result">

Waiting for Calculation...

</div>
<h2 style="margin-top:30px;">📋 Report History</h2>

<table id="historyTable" border="1" width="100%" cellspacing="0" cellpadding="8">
<thead>
<tr>
<th>Buyer</th>
<th>Style</th>
<th>Date</th>
<th>Result</th>
</tr>
</thead>

<tbody>

</tbody>

</table>
</div>
<div class="footer">
© 2026 Textile Lab Software Pro | Developed by Nijam Uddin
</div>
<script src="script.js"></script>

</body>
</html>
